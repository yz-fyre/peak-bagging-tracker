name: Run Fell bagging Pipeline

on:
  schedule:
    - cron: '0 2 * * 0'  # weekly on Sundays at 02:00 UTC
  workflow_dispatch:      # allows manual runs too

jobs:
  run-pipeline:
    runs-on: ubuntu-latest

    steps:

      - name: Install ODBC Driver 18 for SQL Server
        run: |
          curl https://packages.microsoft.com/keys/microsoft.asc | sudo tee /etc/apt/trusted.gpg.d/microsoft.asc
          curl https://packages.microsoft.com/config/ubuntu/22.04/prod.list | sudo tee /etc/apt/sources.list.d/mssql-release.list
          sudo apt-get update
          ACCEPT_EULA=Y sudo apt-get install -y msodbcsql18 unixodbc-dev
    
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Create virtual environment
        run: python -m venv .venv

      - name: Install dependencies
        run: |
          source .venv/bin/activate
          pip install -r requirements.txt

      - name: Write Google service account credentials
        run: |
          mkdir -p secrets
          printf '%s' "$GBQ_CREDS" > secrets/gbq-wainwirghts-bot-creds.json
          chmod 600 secrets/gbq-wainwirghts-bot-creds.json
        env:
            GBQ_CREDS: ${{ secrets.GOOGLE_BIG_QUERY_SA_CREDS }}

      - name: Validate Google credentials JSON
        run: |
          python -c "import json; json.load(open('secrets/gbq-wainwirghts-bot-creds.json'))" && echo "JSON is valid"
      
      - name: Run pipeline
        run: |
          source .venv/bin/activate
          for attempt in 1 2 3; do
            echo "Attempt $attempt of 3..."
            if python src/pipeline.py; then
              echo "Pipeline succeeded."
              exit 0
            fi
            echo "Attempt $attempt failed. Waiting 30s before retry (Azure SQL may be waking up)..."
            sleep 30
          done
          echo "Pipeline failed after 3 attempts."
          exit 1
        env:
          AZURE_SQL_SERVER: ${{ secrets.AZURE_SQL_SERVER }}
          AZURE_SQL_DATABASE: ${{ secrets.AZURE_SQL_DATABASE }}
          AZURE_SQL_USERNAME: ${{ secrets.AZURE_SQL_USERNAME }}
          AZURE_SQL_PASSWORD: ${{ secrets.AZURE_SQL_PASSWORD }}
          GOOGLE_APPLICATION_CREDENTIALS: secrets/gbq-wainwirghts-bot-creds.json